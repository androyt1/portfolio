<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Premium portfolio for a senior frontend and full-stack engineer focused on polished interfaces, resilient systems, and high-performance product delivery."
    />
    <meta name="theme-color" content="#05070b" />
    <meta property="og:title" content="Senior Frontend & Full-Stack Engineer" />
    <meta
      property="og:description"
      content="A cinematic engineering portfolio blending product craft, performance, and modern frontend execution."
    />
    <meta property="og:type" content="website" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <title>Senior Frontend & Full-Stack Engineer</title>
    <script>
      (() => {
        const storageKey = 'portfolio-theme-preference';
        const storedTheme = window.localStorage.getItem(storageKey);
        const themePreference =
          storedTheme === 'light' || storedTheme === 'dark' || storedTheme === 'system'
            ? storedTheme
            : 'system';
        const resolvedTheme =
          themePreference === 'system'
            ? window.matchMedia('(prefers-color-scheme: dark)').matches
              ? 'dark'
              : 'light'
            : themePreference;

        document.documentElement.dataset.theme = resolvedTheme;
        document.documentElement.dataset.themePreference = themePreference;

        const themeColorMeta = document.querySelector('meta[name="theme-color"]');
        if (themeColorMeta) {
          themeColorMeta.setAttribute(
            'content',
            resolvedTheme === 'dark' ? '#05070b' : '#f4f7fb',
          );
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
